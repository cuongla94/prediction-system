name: CI & Deploy

# Push-to-deploy, added 2026-07-20. Replaces the previous manual
# rsync + ssh + systemctl restart flow (see deploy/README.md).
#
# THIS REPOSITORY IS PUBLIC: this file and every run log are world-readable.
# Two consequences that constrain everything below:
#   1. No secret may be interpolated inline into a `run:` block. `${{ }}` is
#      textual substitution into the shell script, so a secret containing
#      shell metacharacters becomes executable text. Secrets go through
#      `env:` and are referenced as "$VAR" instead.
#   2. The droplet's address is itself a secret rather than a literal here,
#      so the deploy target isn't published alongside the code.
#
# The deploy key this uses is NOT a general-purpose root key: it is pinned on
# the droplet to a forced command (`command="/usr/local/bin/kalshi-deploy"` in
# root's authorized_keys), so it cannot open a shell, forward a port, or read
# .env even though it authenticates as root. See deploy/README.md.

on:
  push:
    branches: [main]

# Least privilege: nothing in this workflow writes back to the repository.
permissions:
  contents: read

jobs:
  test:
    name: Tests & lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      # @v7, not @v8: the latest *release* is v8.3.2, but astral-sh/setup-uv
      # does not publish a floating `v8` major tag (verified 2026-07-20 --
      # `git/ref/tags/v8` is a 404 while v6 and v7 resolve). Referencing a tag
      # that doesn't exist fails the job at "Set up job", before any step runs,
      # which is a confusing failure mode because nothing in the workflow body
      # is implicated. Check the tag actually resolves before bumping this.
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          # .python-version already pins 3.13; naming it here too makes the
          # CI interpreter explicit at the top of the run log.
          python-version: "3.13"
          # Defaults to "auto" (on for GitHub-hosted runners); explicit for
          # clarity. The default cache-dependency-glob already keys on uv.lock.
          enable-cache: true

      # --locked, deliberately NOT --frozen: this errors if uv.lock is stale
      # relative to pyproject.toml. That's a real gate, not a formality — a
      # dependency bump committed without regenerating the lock would
      # otherwise pass CI here and then deploy the OLD resolution to the
      # droplet, since deploys install with --frozen.
      #
      # The `dev` group (pytest + ruff) is installed by default; --all-groups
      # is a no-op today and only future-proofs adding a separate test group.
      - name: Install dependencies
        run: uv sync --locked --all-groups

      # --no-sync on both steps: the environment was just synced above, and
      # without it `uv run` re-locks and re-syncs on every single invocation.
      - name: Lint
        run: uv run --no-sync ruff check .

      - name: Tests
        run: uv run --no-sync pytest -q

  deploy:
    name: Deploy to droplet
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Job-level rather than workflow-level, so `test` still runs in parallel
    # across pushes and only the deploy itself serializes.
    #
    # cancel-in-progress: false — a half-applied deploy must never be killed
    # partway through. Note GitHub holds at most ONE pending run per group, so
    # a third push cancels the middle *pending* one; that's the desired
    # "deploy latest" behaviour, and the remote wrapper's monotonicity check
    # is what stops an out-of-order run from regressing production.
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      # No checkout step on purpose: this job only opens an SSH session. The
      # droplet fetches its own code straight from GitHub, so the runner never
      # needs a copy of the tree.
      - name: Deploy
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          set -euo pipefail

          # Preflight. A missing or misnamed secret resolves to an empty string
          # rather than erroring, which otherwise surfaces much later as an
          # inscrutable "Load key: invalid format" or "Could not resolve
          # hostname" -- and if DEPLOY_HOST is the empty one, ssh silently
          # treats the SHA argument as the hostname. Fail here with the actual
          # cause instead.
          #
          # Only presence and length are reported, never any value. GitHub
          # masks secrets in logs, but not echoing them at all is the habit
          # worth keeping on a public repository.
          missing=0
          for name in DEPLOY_SSH_KEY DEPLOY_KNOWN_HOSTS DEPLOY_HOST; do
            eval "value=\${$name:-}"
            if [ -z "$value" ]; then
              echo "MISSING: repository secret '$name' is empty or not set" >&2
              missing=1
            else
              echo "  $name: present (${#value} chars)"
            fi
          done
          [ "$missing" -eq 0 ] || {
            echo "Add the missing secret(s) under Settings > Secrets and variables > Actions." >&2
            exit 1
          }

          # umask before creating anything, so the private key is never even
          # briefly group/world-readable.
          umask 077
          mkdir -p ~/.ssh

          # printf, not echo: OpenSSH rejects a private key that doesn't end
          # in exactly one newline, and echo's behaviour varies by shell.
          printf '%s\n' "$DEPLOY_SSH_KEY"     > ~/.ssh/deploy_key
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/deploy_key ~/.ssh/known_hosts

          # Validate the key actually parses, and show which key it is. Deriving
          # the PUBLIC key from the private one is safe to print and is the
          # fastest way to tell "wrong key pasted" from "key is fine but the
          # droplet rejected it" -- compare this fingerprint against the entry
          # in the droplet's /root/.ssh/authorized_keys.
          if ! ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null 2>&1; then
            echo "DEPLOY_SSH_KEY did not parse as a private key." >&2
            echo "  Paste the whole file including the BEGIN/END lines." >&2
            exit 1
          fi
          echo "  deploy key fingerprint: $(ssh-keygen -y -f ~/.ssh/deploy_key | ssh-keygen -lf -)"
          echo "  known_hosts entries: $(grep -vc '^#' ~/.ssh/known_hosts || true)"

          # The host key is pinned from a secret rather than discovered with
          # ssh-keyscan at runtime — keyscan-then-trust would accept whatever
          # answers, defeating the point. StrictHostKeyChecking=yes means a
          # rebuilt droplet fails closed with a host-key mismatch (expected
          # and correct: re-capture the key and update the secret).
          #
          # $GITHUB_SHA is passed as the SSH command. The droplet's forced
          # command ignores it as a command and reads it as
          # $SSH_ORIGINAL_COMMAND, validating it is a 40-hex SHA that is
          # genuinely on origin/main. Pinning the exact SHA is what makes the
          # test gate meaningful: without it, a commit landing between the
          # test job and this one would be deployed untested.
          ssh -i ~/.ssh/deploy_key \
              -o IdentitiesOnly=yes \
              -o BatchMode=yes \
              -o StrictHostKeyChecking=yes \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              -o ConnectTimeout=15 \
              -o ServerAliveInterval=15 \
              -o ServerAliveCountMax=8 \
              "$DEPLOY_HOST" "$GITHUB_SHA"
